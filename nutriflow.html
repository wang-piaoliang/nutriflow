<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>NutriFlow</title>
<meta name="description" content="每日摄入、采购记录和食材营养库">
<meta name="theme-color" content="#f6f7f2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f1110" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="NutriFlow">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<style>
:root{
  color-scheme:light dark;
  --bg:#f6f7f2;
  --surface:#fff;
  --surface-2:#eef3ec;
  --surface-3:#f8faf5;
  --text:#151515;
  --muted:#687069;
  --line:rgba(20,20,20,.09);
  --green:#1f7a4d;
  --red:#b23a48;
  --blue:#276cbb;
  --amber:#a76512;
  --shadow:0 12px 35px rgba(31,37,45,.09);
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#0f1110;
    --surface:#1a1c1a;
    --surface-2:#232820;
    --surface-3:#171917;
    --text:#f3f4ee;
    --muted:#a9aea6;
    --line:rgba(255,255,255,.1);
    --green:#6ccf95;
    --red:#ff7f8c;
    --blue:#8cbcff;
    --amber:#f0b45b;
    --shadow:0 16px 40px rgba(0,0,0,.35);
  }
}
*{box-sizing:border-box}
html{
  width:100%;
  max-width:100%;
  overflow-x:hidden;
  scroll-behavior:smooth;
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
}
body{
  margin:0;
  width:100%;
  max-width:100%;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;
  font-size:15px;
  line-height:1.4;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}
button{font:inherit;cursor:pointer}
input{font:inherit}
.app{
  width:100%;
  max-width:540px;
  margin:0 auto;
  padding:16px 12px calc(88px + env(safe-area-inset-bottom));
  overflow:hidden;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:8px 0 16px;
}
.brand{display:flex;flex-direction:column;gap:3px}
h1{margin:0;font-size:28px;letter-spacing:0;font-weight:780}
.brand span,.muted{color:var(--muted)}
.brand span{font-size:13px}
.icon-btn{
  width:42px;
  height:42px;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--surface);
  color:var(--text);
  display:grid;
  place-items:center;
  box-shadow:var(--shadow);
}
.view{display:none}
.view.active{display:block}
.stack{display:grid;gap:12px}
.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:8px;
  padding:14px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.hero{
  color:var(--text);
  background:var(--surface-3);
  border-color:color-mix(in srgb,#238153 42%,var(--line));
}
.hero h2{font-size:28px;color:var(--text)}
.hero p{margin:8px 0 0;color:var(--muted);font-size:14px;line-height:1.5}
#home h2{font-size:16px}
#home .hero h2{font-size:20px}
#home .hero p{font-size:12px}
#home .metric b{font-size:18px}
#home .metric span{font-size:11px}
#home .target-row{padding:10px}
#home .target-row strong{font-size:13px}
#home .target-row b{font-size:14px}
#home .target-row small{font-size:12px}
.reference-figure{margin:0}
.reference-figure a{
  display:block;
  overflow:hidden;
  border:1px solid var(--line);
  border-radius:8px;
  background:#fff;
}
.reference-figure img{
  display:block;
  width:100%;
  height:auto;
}
.reference-figure figcaption{
  margin-top:10px;
  color:var(--muted);
  font-size:12px;
  line-height:1.55;
}
.section-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin:2px 0 12px;
}
h2{margin:0;font-size:18px;letter-spacing:0;color:var(--text)}
h3{margin:0;font-size:15px;letter-spacing:0}
.subtle{color:var(--muted);font-size:13px}
.pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:30px;
  padding:6px 10px;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--surface);
  color:var(--text);
  font-size:13px;
  white-space:nowrap;
}
.hero .pill{background:#238153;color:white;border-color:#238153}
.metrics,.grid2{display:grid;grid-template-columns:1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.metric,.target{
  min-width:0;
  padding:13px 10px;
  border-radius:8px;
  background:var(--surface-2);
}
.hero .metric{background:#bc3d50;color:white}
.hero .metric:nth-child(2){background:#238153}
.hero .metric:nth-child(3){background:#3073bd}
.metric b{display:block;font-size:22px;line-height:1.1}
.metric span{display:block;margin-top:6px;color:var(--muted);font-size:12px;line-height:1.35}
.target b{display:block;font-size:17px;line-height:1.2}
.target span{display:block;margin-top:6px;color:var(--muted);font-size:13px;line-height:1.45}
.target .weekly-total{color:var(--text);font-weight:650}
.hero .metric span{color:rgba(255,255,255,.84)}
.list{display:grid;gap:10px}
.item{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:10px;
  padding:11px;
  background:var(--surface-2);
  border-radius:8px;
  min-width:0;
}
.item > div,.buy-row > div,.receipt-line > div{min-width:0}
.item.slim{grid-template-columns:1fr}
.item.tall{align-items:start}
.target-row{
  display:grid;
  gap:6px;
  padding:12px;
  background:var(--surface-2);
  border-radius:8px;
  min-width:0;
}
.target-row-head{
  display:grid;
  grid-template-columns:minmax(48px,auto) minmax(0,1fr);
  gap:12px;
  align-items:flex-start;
}
.target-row strong{font-size:15px}
.target-row b{
  font-size:16px;
  line-height:1.35;
  text-align:right;
  min-width:0;
  overflow-wrap:anywhere;
}
.target-row small{color:var(--muted);line-height:1.4;overflow-wrap:anywhere}
.buy-row{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:10px;
  align-items:center;
  padding:12px;
  background:var(--surface-2);
  border-radius:8px;
}
.buy-row input{width:20px;height:20px;accent-color:var(--green)}
.buy-row.done{opacity:.56}
.buy-row.done strong{text-decoration:line-through}
.consumed-section{
  margin-top:16px;
  padding-top:14px;
  border-top:1px solid var(--line);
}
.consumed-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.consumed-head h3{font-size:14px}
.history-details{margin-top:8px}
.history-details > summary{
  padding:10px 4px 2px;
  color:var(--green);
  font-size:13px;
  font-weight:650;
  cursor:pointer;
  list-style:none;
}
.history-details > summary::-webkit-details-marker{display:none}
.history-details > summary::after{content:"＋";float:right}
.history-details[open] > summary::after{content:"−"}
.history-details .list{margin-top:10px}
.icon{
  width:34px;
  height:34px;
  border-radius:8px;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,.72);
  color:#111;
  font-size:18px;
}
.item strong,.buy-row strong,.receipt-line strong{display:block;font-size:16px;line-height:1.25}
.item small,.buy-row small,.receipt-line small{
  display:block;
  margin-top:4px;
  color:var(--muted);
  font-size:13px;
  line-height:1.38;
  overflow-wrap:anywhere;
}
.amount{text-align:right;font-weight:740;white-space:nowrap}
.amount small{text-align:right}
.tabs{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  overflow:visible;
  max-width:100%;
  padding:2px 0 8px;
}
.tab-chip{
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--surface);
  color:var(--muted);
  padding:8px 11px;
  white-space:nowrap;
}
.tab-chip.active{background:var(--green);border-color:var(--green);color:white}
.bars{display:grid;gap:12px}
.bar-row{display:grid;gap:7px}
.bar-head{display:flex;align-items:center;justify-content:space-between;font-size:14px;gap:10px}
.track{height:8px;background:var(--surface-2);border-radius:8px;overflow:hidden}
.fill{height:100%;border-radius:8px;background:var(--green);width:0}
.fill.warn{background:var(--amber)}
.fill.hot{background:var(--red)}
.record{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  padding:13px 0;
  border-bottom:1px solid var(--line);
}
.record:last-child{border-bottom:0}
.record strong{display:block}
.record small{display:block;margin-top:4px;color:var(--muted);line-height:1.4}
.receipt-card{
  padding:13px;
  border-radius:8px;
  background:var(--surface-2);
}
.receipt-card + .receipt-card{margin-top:12px}
.receipt-card > summary{list-style:none;cursor:pointer}
.receipt-card > summary::-webkit-details-marker{display:none}
.receipt-head{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  align-items:start;
}
.receipt-head strong{display:block;font-size:17px}
.receipt-head small{display:block;margin-top:4px;color:var(--muted);line-height:1.35}
.receipt-total{text-align:right;font-weight:780;font-size:18px}
.receipt-total small{font-size:11px;text-align:right}
.receipt-card[open] .receipt-head{padding-bottom:10px;border-bottom:1px solid var(--line)}
.receipt-lines{display:grid;gap:10px;margin-top:10px}
.receipt-line{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:10px;
  align-items:center;
  min-width:0;
}
.receipt-line small{display:block;margin-top:3px;color:var(--muted);line-height:1.35}
.price{font-weight:760;text-align:right;white-space:nowrap}
.note{
  margin-top:10px;
  padding:12px;
  border-radius:8px;
  background:var(--surface-3);
  color:var(--muted);
  font-size:13px;
  line-height:1.45;
}
.bottom-nav{
  position:fixed;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  width:100%;
  max-width:540px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:4px;
  padding:8px 10px calc(8px + env(safe-area-inset-bottom));
  background:color-mix(in srgb,var(--surface) 88%,transparent);
  border-top:1px solid var(--line);
  backdrop-filter:blur(18px);
}
.nav-btn{
  height:54px;
  border:0;
  border-radius:8px;
  background:transparent;
  color:var(--muted);
  display:grid;
  place-items:center;
  gap:2px;
  font-size:11px;
}
.nav-btn b{font-size:20px;line-height:1}
.nav-btn.active{background:var(--surface-2);color:var(--text)}
@media (min-width:820px){
  .app{max-width:980px}
  .desktop-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .desktop-span{grid-column:1/-1}
  .grid2{grid-template-columns:repeat(2,1fr)}
  .item.slim{grid-template-columns:1fr}
  .bottom-nav{max-width:980px}
}
@media (max-width:430px){
  .app{padding-left:10px;padding-right:10px}
  .topbar{padding:6px 0 12px}
  h1{font-size:26px}
  .brand span{font-size:12px}
  .icon-btn{width:40px;height:40px}
  .card{padding:12px}
  .hero h2{font-size:24px}
  .hero p{font-size:13px}
  .grid3{gap:7px}
  .metric{padding:10px 8px}
  .metric b{font-size:19px}
  .metric span{font-size:11px}
  h2{font-size:17px}
  .section-title{align-items:flex-start}
  .subtle{font-size:12px}
  .target-row-head{grid-template-columns:48px minmax(0,1fr);gap:8px}
  .target-row b{text-align:left;font-size:16px}
  .target-row strong{font-size:14px}
  .target-row small{font-size:13px}
  .target b{font-size:16px}
  .target span{font-size:12px}
  .item{grid-template-columns:auto minmax(0,1fr);align-items:start}
  .item .amount{grid-column:2;text-align:left;font-size:13px;color:var(--muted)}
  .item .amount small{display:inline;text-align:left}
  .tab-chip{padding:7px 10px;font-size:14px}
  .receipt-head strong{font-size:16px}
  .receipt-total{font-size:16px}
  .nav-btn{height:50px}
}
@media (max-width:360px){
  .grid3{grid-template-columns:1fr}
}
@media print{
  body{background:white;color:#111}
  .bottom-nav,.icon-btn,.tabs{display:none}
  .app{width:100%;padding:0}
  .view{display:block}
  .card{box-shadow:none;break-inside:avoid}
}
</style>
</head>
<body>
<main class="app">
  <div class="topbar">
    <div class="brand">
      <h1>NutriFlow</h1>
      <span>每日摄入 · 采购历史 · 食材库</span>
    </div>
    <button class="icon-btn" onclick="window.print()" title="打印">⌘</button>
  </div>

  <section class="view active" id="home">
    <div class="stack desktop-grid">
      <article class="card hero desktop-span">
        <div class="section-title">
          <h2>今天吃到这些</h2>
          <span class="pill" id="todayLabel">今天</span>
        </div>
        <div class="grid3" id="homeCore"></div>
        <p>按全天总量判断，不要求每顿完全平均；目标是长期营养、补铁和适度增重。</p>
      </article>

      <article class="card">
        <div class="section-title">
          <h2>每顿目标</h2>
          <span class="subtle">早餐 / 午餐 / 晚餐</span>
        </div>
        <div class="list" id="mealList"></div>
      </article>

      <article class="card">
        <div class="section-title">
          <h2>每天目标</h2>
          <span class="subtle">全天总量</span>
        </div>
        <div class="list" id="dailyList"></div>
      </article>

      <article class="card desktop-span">
        <div class="section-title">
          <h2>居民膳食宝塔</h2>
          <span class="pill">每日参考</span>
        </div>
        <figure class="reference-figure">
          <a href="./balanced-diet-pagoda-2022.png" target="_blank" rel="noopener" aria-label="打开高清版中国居民平衡膳食宝塔">
            <img src="./balanced-diet-pagoda-2022.png" alt="中国居民平衡膳食宝塔（2022），展示每日各类食物建议摄入量" loading="lazy" decoding="async">
          </a>
          <figcaption>图中的克数和毫升数均为每天的建议量；“每周至少 2 次水产品”是频率建议。点击图片可查看高清版。</figcaption>
        </figure>
      </article>
    </div>
  </section>

  <section class="view" id="shopping">
    <div class="stack desktop-grid">
      <article class="card">
        <div class="section-title">
          <h2>购买的食品</h2>
          <span class="subtle">吃完勾掉</span>
        </div>
        <div class="list" id="boughtFoods"></div>
        <div class="consumed-section" id="consumedSection">
          <div class="consumed-head">
            <h3>已吃完历史</h3>
            <span class="subtle" id="consumedMeta">0 件</span>
          </div>
          <div class="list" id="consumedFoods"></div>
        </div>
      </article>

      <article class="card">
        <div class="section-title">
          <h2>采购历史</h2>
          <span class="subtle" id="purchaseMeta">0 条</span>
        </div>
        <div id="purchaseHistory"></div>
      </article>
    </div>
  </section>

  <section class="view" id="foods">
    <div class="stack">
      <article class="card">
        <div class="section-title">
          <h2>每周采购目标</h2>
          <span class="subtle">按分类汇总</span>
        </div>
        <div class="grid2" id="weeklySummary"></div>
      </article>

      <article class="card">
        <div class="section-title">
          <h2>食材营养价值</h2>
          <span class="subtle">个人优先级 · 满分 5.0</span>
        </div>
        <div class="note">综合营养密度、缺铁恢复、适度增重、胆囊结石与结直肠癌家族史排序；分数用于采购选择，不代表治疗效果。</div>
        <div class="tabs" id="foodTabs"></div>
        <div class="list" id="foodList"></div>
      </article>
    </div>
  </section>
</main>

<nav class="bottom-nav" aria-label="主导航">
  <button class="nav-btn active" data-view="home"><b>◎</b><span>首页</span></button>
  <button class="nav-btn" data-view="foods"><b>★</b><span>食材</span></button>
  <button class="nav-btn" data-view="shopping"><b>＋</b><span>采购</span></button>
</nav>

<script>
const categories = [
  {id:"animalProtein", name:"鱼禽瘦肉", icon:"🐟", weeklyAmount:"鱼 300-500g + 畜禽肉合计 300-500g", weeklyVariety:"3-5 种", note:"鱼约 2 次；红肉和禽肉共享畜禽肉额度，不分别叠加。"},
  {id:"eggDairySoy", name:"蛋奶豆", icon:"🥛", weeklyAmount:"鸡蛋约 7 个 + 奶 2.1-3.5L + 大豆及制品适量", weeklyVariety:"3-5 种"},
  {id:"vegetable", name:"蔬菜", icon:"🥦", weeklyAmount:"2.5-3.5kg", weeklyVariety:"5-8 种"},
  {id:"staple", name:"主食", icon:"🍚", weeklyAmount:"干粮 0.7-1.0kg + 薯类 0.6-1.0kg", weeklyVariety:"3-5 种"},
  {id:"fruitNut", name:"水果坚果", icon:"🍎", weeklyAmount:"水果 2.0-2.5kg + 坚果 0.1-0.15kg", weeklyVariety:"4-6 种"}
];

const dailyTargets = [
  {name:"鱼禽肉蛋", amount:"120-200g", note:"可食生重；鱼、牛猪瘦肉、鸡肉和鸡蛋轮换，不靠单一肉类堆量。"},
  {name:"蔬菜", amount:"350-500g", note:"深绿叶菜 + 十字花科 + 其他颜色蔬菜。"},
  {name:"主食熟重", amount:"250-300g", note:"米饭、杂粮饭、红薯、土豆；增重方向不压主食。"},
  {name:"水果", amount:"300g", note:"全天吃够即可，苹果、橙子、蓝莓、猕猴桃轮换。"},
  {name:"奶/酸奶", amount:"300-500ml", note:"牛奶配料只有生牛乳；酸奶优先无糖高蛋白。"},
  {name:"其中鸡蛋", amount:"1 个", note:"计入上面的鱼禽肉蛋总量；保留蛋黄。"}
];

const mealTargets = [
  {name:"早餐", amount:"牛奶 300ml + 鸡蛋 1 个 + 主食", note:"全麦面包、燕麦或米饭都可以；增重靠规律吃够，不靠高油。"},
  {name:"午餐", amount:"鱼/瘦肉 50-90g + 菜 150-250g + 主食 120-180g", note:"肉量按可食生重；优先安排鱼或含血红素铁的瘦肉。"},
  {name:"晚餐", amount:"鱼/瘦肉 40-70g + 菜 150-250g + 主食 120-180g", note:"和早餐鸡蛋合并看全天总量，不要求每顿平均。"},
  {name:"加餐", amount:"水果 100-150g 或坚果 15-20g", note:"适度增重时保留加餐，比硬塞正餐更容易坚持。"}
];

function parseTarget(target){
  const text = String(target || "");
  const match = text.match(/(\d+(?:\.\d+)?)(?:-(\d+(?:\.\d+)?))?/);
  if (!match) return 1;
  const value = Number(match[2] || match[1]);
  if (/kg|公斤/.test(text)) return value * 1000;
  if (/(^|[^m])L/.test(text)) return value * 1000;
  if (/斤/.test(text)) return value * 500;
  return value;
}
function parseAmount(amount){
  const text = String(amount || "");
  const match = text.match(/(\d+(?:\.\d+)?)/);
  if (!match) return 0;
  const value = Number(match[1]);
  if (/kg|公斤/.test(text)) return value * 1000;
  if (/(^|[^m])L/.test(text)) return value * 1000;
  if (/斤/.test(text)) return value * 500;
  return value;
}
function formatWeight(grams){
  if (grams >= 1000) return `${(grams / 1000).toFixed(3).replace(/0+$/, "").replace(/\.$/, "")}kg`;
  return `${Math.round(grams)}g`;
}
function summarizeReceipt(items){
  return purchaseGroupRules.map(group => {
    const grams = items
      .filter(item => group.ids.includes(item.foodId))
      .reduce((sum, item) => sum + parseAmount(item.amount), 0);
    return grams ? `${group.name} ${formatWeight(grams)}` : "";
  }).filter(Boolean).join(" · ");
}
function sameWeek(dateText){
  const date = new Date(dateText);
  const now = new Date();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));
  monday.setHours(0,0,0,0);
  const next = new Date(monday);
  next.setDate(monday.getDate() + 7);
  return date >= monday && date < next;
}
function weeklyBought(food){
  return purchases
    .filter(purchase => purchase.bought && purchase.foodId === food.id && sameWeek(purchase.date))
    .reduce((sum, purchase) => sum + parseAmount(purchase.amount), 0);
}

    .filter(purchase => consumed[purchase.id])
    .sort((a,b) => String(consumed[b.id]).localeCompare(String(consumed[a.id])) || b.date.localeCompare(a.date));
  const renderBoughtItem = (purchase, done) => {
    const icon = iconForFood(purchase.foodId);
    return `<label class="buy-row ${done ? "done" : ""}">
      <input type="checkbox" data-consumed="${purchase.id}" ${done ? "checked" : ""}>
      <div><strong>${purchase.item}</strong><small>${purchase.amount} · 购买于 ${purchase.date.slice(0,10)}<br>${purchase.store}</small></div>
      <span class="amount">${icon}</span>
    </label>`;
  };
  document.getElementById("boughtFoods").innerHTML = activeItems.map(purchase => renderBoughtItem(purchase, false)).join("") || `<div class="note">当前没有正在吃的食品。</div>`;

  const olderConsumed = consumedItems.slice(1);
  document.getElementById("consumedFoods").innerHTML = consumedItems.length ? `
    ${recentConsumed.map(purchase => renderBoughtItem(purchase, true)).join("")}
    ${olderConsumed.length ? `<details class="history-details"><summary>查看其余 ${olderConsumed.length} 件</summary><div class="list">${olderConsumed.map(purchase => renderBoughtItem(purchase, true)).join("")}</div></details>` : ""}
  ` : `<div class="note">还没有吃完记录。</div>`;
  document.getElementById("consumedMeta").textContent = `${consumedItems.length} 件`;
  document.querySelectorAll("[data-consumed]").forEach(input => {

    const lines = receipt.items.map(item => `
      <div class="receipt-line">
        <span class="icon">${iconForFood(item.foodId)}</span>
        <div><strong>${item.item}</strong><small>${item.amount}${item.packageSpec ? ` · ${item.packageSpec}` : ""}${item.unitPrice ? `<br>${item.unitPrice}` : ""}</small></div>
        <div class="price">${item.totalPrice ? `¥${Number(item.totalPrice).toFixed(2).replace(/\.00$/, "")}` : ""}</div>
      </div>
    `).join("");
    return `<details class="receipt-card">
      <summary class="receipt-head">
        <div><strong>${receipt.store}</strong><small>${receipt.date} · ${boughtCount} 件${categorySummary ? ` · ${categorySummary}` : ""}</small></div>
        <div class="receipt-total">¥${receiptTotal.toFixed(2)}<small>展开</small></div>
      </summary>
      <div class="receipt-lines">${lines}</div>
    </details>`;
  }).join("") : `<div class="note">暂无采购记录。</div>`;
}
function renderFoods(){
  const summary = categories.map(category => {
    const list = foods.filter(food => food.category === category.id);
    const top = list
      .slice()
      .sort((a,b) => b.score - a.score)
      .slice(0,6)
      .map(food => food.name)
      .join(" / ");
    return `<div class="target"><b>${category.icon} ${category.name}</b><span class="weekly-total">每周共买 ${category.weeklyAmount} · 选 ${category.weeklyVariety}</span><span>${category.note ? `${category.note}<br>` : ""}${top}<br>库内 ${list.length} 组食材可轮换</span></div>`;
  }).join("");
  document.getElementById("weeklySummary").innerHTML = summary;
  const tabs = document.getElementById("foodTabs");
  tabs.innerHTML = categories.map(category => `<button class="tab-chip ${category.id === activeFoodCategory ? "active" : ""}" data-food-cat="${category.id}">${category.icon} ${category.name}</button>`).join("");
  tabs.querySelectorAll("button").forEach(button => {
    button.addEventListener("click", () => {
      activeFoodCategory = button.dataset.foodCat;
      renderFoods();
    });
  });
  const list = foods
    .filter(food => food.category === activeFoodCategory)
    .sort((a,b) => b.score - a.score || a.name.localeCompare(b.name, "zh-CN"));
  document.getElementById("foodList").innerHTML = list.map(food => `
    <div class="item tall">
      <span class="icon">${iconForFood(food.id)}</span>
      <div>
        <strong>${food.name}</strong>
        <small>${food.variants ? `${food.variants}<br>` : ""}${food.nutrients}<br>${food.feature}<br>建议份额 ${food.weeklyTarget} · ${food.weeklyTimes}</small>
      </div>
      <div class="amount">${food.score.toFixed(1)}<small>个人优先级</small></div>
    </div>
  `).join("");
}
document.querySelectorAll(".nav-btn").forEach(button => {
  button.addEventListener("click", () => {
    document.querySelectorAll(".nav-btn").forEach(item => item.classList.remove("active"));
    document.querySelectorAll(".view").forEach(item => item.classList.remove("active"));
    button.classList.add("active");
    document.getElementById(button.dataset.view).classList.add("active");
    window.scrollTo({top:0, behavior:"smooth"});
  });
});
if ("serviceWorker" in navigator && location.protocol !== "file:") {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
render();
</script>
</body>
</html>
